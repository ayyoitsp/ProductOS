<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ProductOS — Vet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header>
      <div class="row">
        <h1>Product<span class="dim">OS</span></h1>
        <nav>
          <button class="filter active" data-status="">All</button>
          <button class="filter" data-status="proposed">Proposed</button>
          <button class="filter" data-status="planned">Planned</button>
          <button class="filter" data-status="validated">Validated</button>
          <button class="filter" data-status="contested">Contested</button>
        </nav>
        <button id="refresh" title="Refresh">↻</button>
      </div>
    </header>
    <main id="cards">
      <div class="empty">Loading…</div>
    </main>
    <script src="/app.js"></script>
  </body>
